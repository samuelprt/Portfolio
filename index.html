<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio | Étudiant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Style pour les modales chargées dynamiquement */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            overflow-y: auto;
            padding: 2rem 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal.active { display: block; opacity: 1; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 antialiased">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass top-0 px-6 py-4 flex justify-between items-center">
        <div class="text-xl font-bold tracking-tighter gradient-text">PORTFOLIO.</div>
        <div class="hidden md:flex space-x-8 text-sm font-medium">
            <a href="#about" class="hover:text-indigo-400 transition">À Propos</a>
            <a href="#creations" class="hover:text-indigo-400 transition">Créations</a>
            <a href="#journey" class="hover:text-indigo-400 transition">Parcours</a>
        </div>
        <a href="mailto:votre@email.com" class="bg-indigo-600 hover:bg-indigo-500 px-5 py-2 rounded-full text-sm font-semibold transition">Contact</a>
    </nav>

    <!-- Hero Section Directe (pour éviter un flash blanc au chargement) -->
    <header class="h-screen flex flex-col justify-center items-center text-center px-4">
        <h1 class="text-5xl md:text-7xl font-bold mb-4">
            Salut, je suis <span class="gradient-text">Étudiant</span>
        </h1>
        <p class="text-xl text-gray-400 max-w-2xl mb-8 italic">
            "Le parcours définit la destination."
        </p>
        <div class="flex space-x-4">
            <a href="#creations" class="bg-white text-gray-900 px-8 py-3 rounded-xl font-bold hover:bg-gray-200 transition">Mes Projets</a>
            <a href="#about" class="border border-gray-700 px-8 py-3 rounded-xl font-bold hover:bg-gray-800 transition">Mon Profil</a>
        </div>
    </header>

    <!-- Zones de chargement dynamique -->
    <div id="section-creations"></div>
    <div id="section-apropos"></div>
    <div id="section-parcours"></div>

    <!-- Footer -->
    <footer class="py-12 border-t border-gray-800 text-center text-gray-500 text-xs">
        <p>© 2024 Portfolio Étudiant. Architecture modulaire.</p>
    </footer>

    <script>
        // Fonction de chargement des composants
        async function loadComponent(id, path) {
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`Erreur chargement ${path}`);
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
                
                // Si on charge les créations, on initialise les scripts spécifiques après l'insertion
                if (id === 'section-creations') {
                    initCreationsScript();
                }
            } catch (err) {
                console.error(err);
                document.getElementById(id).innerHTML = `<p class="text-center py-10 text-red-400">Erreur de chargement de la section.</p>`;
            }
        }

        // Script spécifique pour la modale (doit être appelé après le fetch)
        function initCreationsScript() {
            const modal = document.getElementById('projectModal');
            const btnFerme = document.getElementById('btn-ferme');
            const btnClose = document.getElementById('close-modal');

            if (btnFerme && modal) {
                btnFerme.onclick = () => {
                    modal.style.display = 'block';
                    setTimeout(() => modal.classList.add('active'), 50);
                    document.body.style.overflow = 'hidden';
                };
            }

            window.closeProjectModal = function() {
                modal.classList.remove('active');
                setTimeout(() => modal.style.display = 'none', 300);
                document.body.style.overflow = 'auto';
            };

            if (btnClose) btnClose.onclick = closeProjectModal;
        }

        // Chargement au démarrage
        window.addEventListener('DOMContentLoaded', () => {
            loadComponent('section-creations', 'components/creations.html');
            loadComponent('section-apropos', 'components/apropos.html');
            loadComponent('section-parcours', 'components/parcours.html');
        });
    </script>
</body>
</html>
